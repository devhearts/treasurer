# Full stack: MariaDB, Mailpit, Garage (S3 API), Nest API, Next web.
# Schema: `db-migrate` runs `apps/api/scripts/docker-db-migrate.cjs` once before `api` on every `docker compose up`
# (records `0000_init` in `__drizzle_migrations` if tables already exist from old `drizzle-kit push`, then `drizzle-kit migrate`).
# Manual: `npm run docker:db-migrate`. OG backfill (once per env): `npm run docker:db-backfill-event-og`.
# Host ports: see docker/README-ports.md — defaults match historical ports; use `docker/ports.host.{dev,staging,production}.env`
# via `npm run docker:up:dev` (merges `docker-compose.dev.yml`: Nest watch + Next dev HMR) when other stacks use the same host ports.
#
# Environment: copy `env.example` → `.env` in this directory for `${VAR}` interpolation. Services use
# plain `env_file` paths (older `docker compose` rejects `{ path, required }`). If `docker compose`
# errors on a missing file, add an empty `.env` or drop that `env_file` line. Later `env_file` wins on
# duplicate keys; explicit `environment:` overrides both for Docker hostnames (e.g. DATABASE_URL → mysql).

services:
  mysql:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: treasurer
      MARIADB_USER: treasurer
      MARIADB_PASSWORD: treasurer
    ports:
      - "${HOST_BIND:-0.0.0.0}:${HOST_PORT_MYSQL:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 20s

  mailpit:
    image: axllent/mailpit
    ports:
      - "${HOST_BIND:-0.0.0.0}:${HOST_PORT_MAILPIT_UI:-8025}:8025"
      - "${HOST_BIND:-0.0.0.0}:${HOST_PORT_MAILPIT_SMTP:-1025}:1025"

  # https://garagehq.deuxfleurs.fr/documentation/quick-start/
  garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      RUST_LOG: warn
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-GK0123456789abcdef0123456789abcdef}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      GARAGE_DEFAULT_BUCKET: ${GARAGE_BUCKET:-treasurer}
    volumes:
      - ./docker/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    ports:
      - "${HOST_BIND:-0.0.0.0}:${HOST_PORT_GARAGE_S3:-3900}:3900"
      - "${HOST_BIND:-0.0.0.0}:${HOST_PORT_GARAGE_ADMIN:-3903}:3903"
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 300s
      timeout: 5s
      retries: 5
      start_period: 25s

  db-migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: migrator
    environment:
      DATABASE_URL: mysql://treasurer:treasurer@mysql:3306/treasurer
    depends_on:
      mysql:
        condition: service_healthy
    restart: "no"

  # One-shot: npm run docker:db-backfill-event-og (see root package.json for dev/staging/production profiles).
  db-backfill-event-og:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: backfill
    env_file:
      - .env
      - apps/api/.env
    environment:
      DATABASE_URL: mysql://treasurer:treasurer@mysql:3306/treasurer
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-GK0123456789abcdef0123456789abcdef}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      GARAGE_BUCKET: ${GARAGE_BUCKET:-treasurer}
    depends_on:
      mysql:
        condition: service_healthy
      garage:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    ports:
      - "${HOST_BIND:-0.0.0.0}:${HOST_PORT_API:-4000}:4000"
    env_file:
      - .env
      - apps/api/.env
    environment:
      NODE_ENV: production
      PORT: "4000"
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      INTERNAL_PROXY_SECRET: ${INTERNAL_PROXY_SECRET:-treasurer-docker-dev-secret}
      DATABASE_URL: mysql://treasurer:treasurer@mysql:3306/treasurer
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_REGION: garage
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY:-GK0123456789abcdef0123456789abcdef}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      GARAGE_BUCKET: ${GARAGE_BUCKET:-treasurer}
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      mysql:
        condition: service_healthy
      garage:
        condition: service_healthy
      mailpit:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_FEATURE_SUBSCRIPTION_PAYMENT: ${NEXT_PUBLIC_FEATURE_SUBSCRIPTION_PAYMENT:-0}
        NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    ports:
      - "${HOST_BIND:-0.0.0.0}:${HOST_PORT_WEB:-3000}:3000"
    env_file:
      - .env
      - apps/web/.env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      API_INTERNAL_URL: http://api:4000
      INTERNAL_PROXY_SECRET: ${INTERNAL_PROXY_SECRET:-treasurer-docker-dev-secret}
      NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${NEXT_SERVER_ACTIONS_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
    depends_on:
      - api

volumes:
  mysql-data:
  garage-meta:
  garage-data:
