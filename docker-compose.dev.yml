# Merge with docker-compose.yml for Nest `--watch` + Next dev HMR, e.g.:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml --env-file docker/ports.host.dev.env up -d
# Add `--build` after changing `docker/Dockerfile.dev` or `package-lock.json`.
# or `npm run docker:up:dev`.
#
# Binds ./apps/api and ./apps/web over the image copies; hoisted deps live in /repo/node_modules (image).
# Anonymous volumes hide host apps/*/node_modules so partial local installs do not break resolution.

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: treasurer-dev:latest
    volumes:
      - ./package.json:/repo/package.json
      - ./package-lock.json:/repo/package-lock.json
      - ./apps/api:/repo/apps/api
      - /repo/apps/api/node_modules
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    command:
      [
        "sh",
        "-c",
        "if [ ! -d /repo/node_modules ] || [ /repo/package-lock.json -nt /repo/node_modules ]; then cd /repo && npm ci; fi; exec npm run start:dev -w @treasurer/api",
      ]

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    image: treasurer-dev:latest
    volumes:
      - ./package.json:/repo/package.json
      - ./package-lock.json:/repo/package-lock.json
      - ./apps/web:/repo/apps/web
      - /repo/apps/web/node_modules
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      # Required inside the stack (apps/web/.env often uses 127.0.0.1 for host-only dev).
      API_INTERNAL_URL: http://api:4000
      INTERNAL_PROXY_SECRET: ${INTERNAL_PROXY_SECRET:-treasurer-docker-dev-secret}
    depends_on:
      api:
        condition: service_started
    command:
      [
        "npm",
        "run",
        "dev",
        "-w",
        "@treasurer/web",
        "--",
        "--hostname",
        "0.0.0.0",
      ]
